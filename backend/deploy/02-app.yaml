apiVersion: apps/v1
kind: Deployment
metadata:
  name: tlias-app
  namespace: tlias-system
  labels:
    app: tlias-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tlias-app
  template:
    metadata:
      labels:
        app: tlias-app
    spec:
      containers:
        - name: tlias-app
          image: tlias-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql.tlias-system.svc.cluster.local:3306/student?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "123456"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tlias-app
  namespace: tlias-system
spec:
  selector:
    app: tlias-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
